<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Áurea - Contacto</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/globals.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<a href="#contenido" class="skip-link">Saltar al contenido principal</a>

<nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">Hotel Áurea</a>
  </div>
</nav>

<main id="contenido" class="container py-5 mt-5">

<h1 class="text-center mb-4">Contacto</h1>

<form class="mx-auto" style="max-width:600px;">
  <div class="mb-3">
    <label for="nombre" class="form-label">Nombre</label>
    <input type="text" id="nombre" class="form-control" required>
  </div>

  <div class="mb-3">
    <label for="email" class="form-label">Correo electrónico</label>
    <input type="email" id="email" class="form-control" required>
  </div>

  <div class="mb-3">
    <label for="mensaje" class="form-label">Mensaje</label>
    <textarea id="mensaje" class="form-control" rows="4" required></textarea>
  </div>

  <button type="submit" class="btn btn-gold w-100">Enviar mensaje</button>
</form>

</main>

<footer>
  <p>© 2025 Hotel Áurea. Todos los derechos reservados.</p>
</footer>

</body>
</html>
