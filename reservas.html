<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Áurea - Reservas</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/globals.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<a href="#contenido" class="skip-link">Saltar al contenido principal</a>

<nav class="navbar py-4 navbar-expand-lg bg-body-tertiary fixed-top shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">Hotel Áurea</a>
  </div>
</nav>

<main id="contenido" class="container mt-5 pt-5">

<h1 class="mb-4">Reserva tu estancia</h1>

<form>
  <div class="mb-3">
    <label for="entrada" class="form-label">Fecha de entrada</label>
    <input type="date" id="entrada" class="form-control" required>
  </div>

  <div class="mb-3">
    <label for="salida" class="form-label">Fecha de salida</label>
    <input type="date" id="salida" class="form-control" required>
  </div>

  <button type="submit" class="btn btn-gold w-100">Continuar</button>
</form>

</main>

<footer>
  <p>© 2025 Hotel Áurea. Todos los derechos reservados.</p>
</footer>

</body>
</html>
