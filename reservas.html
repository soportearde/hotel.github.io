<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Áurea - Reservar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/globals.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .pasos {
      display: flex;
      justify-content: center;
      gap: 3rem;
      margin-top: 100px;
      margin-bottom: 40px;
    }
    .paso {
      text-align: center;
      color: #999;
      font-weight: 400;
    }
    .paso.activo {
      color: #cda45e;
    }
    .paso-num {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 10px;
      font-weight: bold;
      background-color: #cda45e;
      color: #fff;
    }
    .paso.no-activo .paso-num {
      background-color: #ddd;
      color: #666;
    }
    .form-reserva {
      background-color: #fff;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .resumen {
      background-color: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 1.5rem;
      height: 100%;
    }
    .btn-reserva {
      background-color: #cda45e;
      color: #fff;
      font-weight: 600;
      border: none;
      transition: background 0.3s;
    }
    .btn-reserva:hover {
      background-color: #b89448;
    }
  </style>
</head>
<body>

  <nav class="navbar py-4 navbar-expand-lg bg-body-tertiary fixed-top shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Hotel Áurea</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="habitaciones.html">Habitaciones</a></li>
          <li class="nav-item"><a class="nav-link active" href="reservas.html">Reservar</a></li>
          <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
        </ul>
        <a href="reservas.html" class="btn btn-gold ms-lg-3 mt-2 mt-lg-0">Reservar Ahora</a>
      </div>
    </div>
  </nav>


  <section class="container mt-5 pt-5">
    <div class="pasos">
      <div class="paso activo">
        <div class="paso-num">1</div>
        <p>Fechas</p>
      </div>
      <div class="paso no-activo">
        <div class="paso-num">2</div>
        <p>Datos</p>
      </div>
      <div class="paso no-activo">
        <div class="paso-num">3</div>
        <p>Confirmación</p>
      </div>
    </div>
  </section>

 
  <section class="container mb-5">
    <div class="row g-4">
      <div class="col-lg-8">
        <div class="form-reserva">
          <h5 class="mb-4">Seleccione sus fechas</h5>
          <form>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Fecha de entrada</label>
                <input type="date" class="form-control" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Fecha de salida</label>
                <input type="date" class="form-control" required>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Huéspedes</label>
                <select class="form-select">
                  <option>1 Huésped</option>
                  <option selected>2 Huéspedes</option>
                  <option>3 Huéspedes</option>
                  <option>4 Huéspedes</option>
                </select>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Habitaciones</label>
                <select class="form-select">
                  <option>1 Habitación</option>
                  <option>2 Habitaciones</option>
                  <option>3 Habitaciones</option>
                </select>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label">Tipo de habitación</label>
              <select class="form-select">
                <option>Seleccione un tipo de habitación</option>
                <option>Estándar</option>
                <option>Deluxe</option>
                <option>Suite Familiar</option>
              </select>
            </div>

            <button type="submit" class="btn btn-reserva w-100 py-2">Continuar</button>
          </form>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="resumen">
          <h5 class="mb-3">Resumen</h5>
          <p>Complete los datos para ver el resumen.</p>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <p>© 2025 Hotel Áurea. Todos los derechos reservados.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
